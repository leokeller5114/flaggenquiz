<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Welt Quiz Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: white; overflow: hidden; }
        
        /* Schatzkiste oben rechts mit Animation */
        #top-bar { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 50px; cursor: pointer; border: 2px solid #ffd700; z-index: 100; transition: transform 0.2s; font-size: 20px; }
        
        .coin-hop { animation: hop 0.4s ease; }
        @keyframes hop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        #quiz-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; width: 400px; color: #333; position: relative; min-height: 500px; display: flex; flex-direction: column; justify-content: center; }
        
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        
        #flag-container { height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; background: #f8f9fa; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; }
        #flag-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #capital-question { font-size: 32px; font-weight: bold; color: #3f51b5; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 15px; cursor: pointer; border: 2px solid #3f51b5; border-radius: 10px; background: white; color: #3f51b5; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button:hover:not(:disabled) { background: #3f51b5; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; border-color: #ccc; color: #ccc; }
        
        .menu-btn { width: 80%; margin: 10px; font-size: 18px; background: #3f51b5; color: white; }
        
        #joker-btn { margin-top: 15px; width: 100%; background: #ffd700; color: #333; border: 2px solid #f1c40f; }
        #joker-btn:hover:not(:disabled) { background: #f1c40f; }

        #score-area { margin-top: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: #3f51b5; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="top-bar" onclick="openShop()">
    💰 <span id="coin-count">0</span>
</div>

<div id="quiz-card">
    <div id="menu-overlay">
        <h1 style="color: #3f51b5; margin-bottom: 30px;">Welt Quiz Pro</h1>
        <button class="menu-btn" onclick="startQuiz('flags')">🚩 Flaggen Quiz</button>
        <button class="menu-btn" onclick="startQuiz('capitals')">🏙️ Hauptstadt Quiz</button>
    </div>

    <h2 id="question-text">Welches Land?</h2>
    
    <div id="flag-container">
        <img id="flag-img" src="" alt="">
        <div id="capital-question" class="hidden"></div>
    </div>
    
    <div class="btn-grid">
        <button class="answer-btn" onclick="check(this)"></button>
        <button class="answer-btn" onclick="check(this)"></button>
        <button class="answer-btn" onclick="check(this)"></button>
        <button class="answer-btn" onclick="check(this)"></button>
    </div>

    <button id="joker-btn" onclick="useJoker()">🃏 50/50 Joker (50 💰)</button>

    <div id="score-area">
        <span id="score">Punkte: 0</span>
        <button onclick="backToMenu()" style="padding: 5px 10px; font-size: 10px; border-color: #ccc; color: #666;">Hauptmenü</button>
    </div>
</div>

<script>
    const countries = [
        {n: "Deutschland", c: "de", cap: "Berlin"}, {n: "Frankreich", c: "fr", cap: "Paris"},
        {n: "Italien", c: "it", cap: "Rom"}, {n: "Spanien", c: "es", cap: "Madrid"},
        {n: "Österreich", c: "at", cap: "Wien"}, {n: "Schweiz", c: "ch", cap: "Bern"},
        {n: "USA", c: "us", cap: "Washington D.C."}, {n: "Großbritannien", c: "gb", cap: "London"},
        {n: "Japan", c: "jp", cap: "Tokio"}, {n: "Brasilien", c: "br", cap: "Brasília"},
        {n: "Türkei", c: "tr", cap: "Ankara"}, {n: "Russland", c: "ru", cap: "Moskau"},
        {n: "China", c: "cn", cap: "Peking"}, {n: "Indien", c: "in", cap: "Neu-Delhi"},
        {n: "Ägypten", c: "eg", cap: "Kairo"}, {n: "Griechenland", c: "gr", cap: "Athen"},
        {n: "Schweden", c: "se", cap: "Stockholm"}, {n: "Norwegen", c: "no", cap: "Oslo"},
        {n: "Australien", c: "au", cap: "Canberra"}, {n: "Kanada", c: "ca", cap: "Ottawa"}
        // Hier kannst du die lange Liste aus der vorherigen Nachricht einfügen!
    ];

    let currentMode = 'flags';
    let currentQuestion;
    let score = 0;
    let coins = localStorage.getItem('coins') ? parseInt(localStorage.getItem('coins')) : 0;

    document.getElementById('coin-count').innerText = coins;

    function startQuiz(mode) {
        currentMode = mode;
        score = 0;
        document.getElementById('score').innerText = "Punkte: " + score;
        document.getElementById('menu-overlay').classList.add('hidden');
        
        if(mode === 'capitals') {
            document.getElementById('flag-img').classList.add('hidden');
            document.getElementById('capital-question').classList.remove('hidden');
            document.getElementById('question-text').innerText = "Was ist die Hauptstadt von...";
        } else {
            document.getElementById('flag-img').classList.remove('hidden');
            document.getElementById('capital-question').classList.add('hidden');
            document.getElementById('question-text').innerText = "Welches Land ist das?";
        }
        nextQuestion();
    }

    function backToMenu() {
        document.getElementById('menu-overlay').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestion = countries[Math.floor(Math.random() * countries.length)];
        
        if(currentMode === 'flags') {
            document.getElementById('flag-img').src = "flags/" + currentQuestion.c + ".png";
        } else {
            document.getElementById('capital-question').innerText = currentQuestion.n;
        }

        let correctAnswer = (currentMode === 'flags') ? currentQuestion.n : currentQuestion.cap;
        let choices = [correctAnswer];

        while(choices.length < 4) {
            let rObj = countries[Math.floor(Math.random() * countries.length)];
            let rAnswer = (currentMode === 'flags') ? rObj.n : rObj.cap;
            if(!choices.includes(rAnswer)) choices.push(rAnswer);
        }
        choices.sort(() => Math.random() - 0.5);

        const btns = document.querySelectorAll('.answer-btn');
        btns.forEach((b, i) => {
            b.innerText = choices[i];
            b.style.visibility = 'visible';
            b.disabled = false;
        });
        document.getElementById('joker-btn').disabled = false;
    }

    function check(btn) {
        let correctAnswer = (currentMode === 'flags') ? currentQuestion.n : currentQuestion.cap;
        
        if(btn.innerText === correctAnswer) {
            score++;
            addCoins(10);
            alert("Richtig! +10 💰");
        } else {
            alert("Leider falsch! Die richtige Antwort war: " + correctAnswer);
        }
        document.getElementById('score').innerText = "Punkte: " + score;
        nextQuestion();
    }

    function useJoker() {
        if (coins >= 50) {
            let correctAnswer = (currentMode === 'flags') ? currentQuestion.n : currentQuestion.cap;
            let btns = Array.from(document.querySelectorAll('.answer-btn'));
            let wrongButtons = btns.filter(b => b.innerText !== correctAnswer);
            
            // Zufällig zwei falsche Buttons verstecken
            wrongButtons.sort(() => Math.random() - 0.5);
            wrongButtons[0].style.visibility = 'hidden';
            wrongButtons[1].style.visibility = 'hidden';
            
            addCoins(-50);
            document.getElementById('joker-btn').disabled = true;
        } else {
            alert("Nicht genug Münzen! Du brauchst 50 💰.");
        }
    }

    function addCoins(amount) {
        coins += amount;
        localStorage.setItem('coins', coins);
        
        const coinDisplay = document.getElementById('coin-count');
        const topBar = document.getElementById('top-bar');
        
        coinDisplay.innerText = coins;
        
        // Animation auslösen
        topBar.classList.remove('coin-hop');
        void topBar.offsetWidth; // Trick um Animation neu zu starten
        topBar.classList.add('coin-hop');
    }

    function openShop() {
        let kaufen = confirm("SHOP:\nMöchtest du 500 Münzen für 0,99 € kaufen?");
        if(kaufen) {
            addCoins(500);
            alert("Kauf erfolgreich!");
        }
    }
</script>
</body>
</html>
