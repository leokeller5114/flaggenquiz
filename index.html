<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welt Quiz Pro Ultimate</title>
    <style>
        :root { --p: #3f51b5; --g: #ffd700; --s: #4caf50; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: radial-gradient(circle, #2e2e5e, #1a1a2e); color: white; overflow: hidden; }
        #top-bar { position: absolute; top: 20px; width: 90%; max-width: 600px; display: flex; justify-content: space-between; z-index: 100; }
        .pill { background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px; border: 2px solid var(--g); backdrop-filter: blur(5px); font-weight: bold; }
        #card { background: white; padding: 25px; border-radius: 30px; width: 90%; max-width: 500px; height: 650px; color: #333; position: relative; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .overlay { position: absolute; inset: 0; background: white; border-radius: 30px; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .scroll { overflow-y: auto; display: block; }
        .bar { width: 100%; background: #eee; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        #fill { background: var(--s); height: 100%; width: 0%; transition: 0.5s; }
        .flashcard { width: 250px; height: 320px; perspective: 1000px; margin: 10px auto; cursor: pointer; }
        .f-inner { position: relative; width: 100%; height: 100%; transition: 0.6s; transform-style: preserve-3d; }
        .flashcard.flip .f-inner { transform: rotateY(180deg); }
        .f-front, .f-back { position: absolute; inset: 0; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid #ddd; border-radius: 20px; background: #f9f9f9; }
        .f-back { transform: rotateY(180deg); background: var(--p); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        button { padding: 15px; border: 2px solid var(--p); border-radius: 12px; background: white; color: var(--p); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        button:hover { background: var(--p); color: white; }
        .m-btn { width: 100%; margin: 5px 0; }
        #flag-img { max-height: 150px; max-width: 100%; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        td, th { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="pill">🎖️ Lvl <span id="lvl">1</span></div>
    <div class="pill" onclick="shop()">💰 <span id="coins">0</span></div>
</div>

<div id="card">
    <!-- Menü -->
    <div id="m-over" class="overlay">
        <h1 style="color:var(--p); margin:0;">Welt Quiz Pro</h1>
        <p id="rank" style="margin:5px; font-weight:bold; color:var(--p);">Tourist</p>
        <div class="bar"><div id="fill"></div></div>
        <button class="m-btn" id="daily" onclick="startDaily()" style="background:#ff5722; color:white; border:none;">📅 Daily Challenge</button>
        <button class="m-btn" onclick="sel('flags')">🚩 Flaggen Quiz</button>
        <button class="m-btn" onclick="sel('capitals')">🏙️ Hauptstadt Quiz</button>
        <button class="m-btn" onclick="sel('learn')" style="background:var(--s); color:white; border:none;">📚 Lern-Bereich</button>
    </div>

    <!-- Region -->
    <div id="r-over" class="overlay hidden">
        <h2 style="color:var(--p)">Region wählen</h2>
        <div class="grid" id="r-grid"></div>
        <button onclick="home()" style="margin-top:15px; width:100%; color:#666; border-color:#666;">Abbrechen</button>
    </div>

    <!-- Lernen -->
    <div id="l-over" class="overlay hidden scroll">
        <div class="flashcard" onclick="this.classList.toggle('flip')">
            <div class="f-inner">
                <div class="f-front"><img id="c-img" src="" style="width:70%"><p style="font-size:12px;color:#999">Klicken</p></div>
                <div class="f-back"><h2 id="c-n"></h2><p id="c-c"></p></div>
            </div>
        </div>
        <button onclick="nextCard()" style="width:100%">Nächste Karte</button>
        <table id="l-table"></table>
        <button onclick="home()" style="margin-top:20px; width:100%">Menü</button>
    </div>

    <!-- Spiel -->
    <div id="game" class="hidden">
        <h2 id="q-txt">Land?</h2>
        <div style="height:160px; display:flex; align-items:center; justify-content:center;">
            <img id="q-img" src="">
            <div id="q-cap" class="hidden" style="font-size:30px; font-weight:bold; color:var(--p)"></div>
        </div>
        <div class="grid" id="ans-grid">
            <button class="a-btn" onclick="check(this)"></button>
            <button class="a-btn" onclick="check(this)"></button>
            <button class="a-btn" onclick="check(this)"></button>
            <button class="a-btn" onclick="check(this)"></button>
        </div>
        <button id="joker" onclick="joker()" style="width:100%; margin-top:15px; background:var(--g); border:none;">🃏 Joker (50 💰)</button>
        <p id="scr" style="font-weight:bold; color:var(--p); font-size:20px;">Punkte: 0</p>
    </div>
</div>

<script>
   const countries = [
    // EUROPA
    {n: "Albanien", c: "al", cap: "Tirana", r: "Europa"}, {n: "Andorra", c: "ad", cap: "Andorra la Vella", r: "Europa"},
    {n: "Belgien", c: "be", cap: "Brüssel", r: "Europa"}, {n: "Bosnien und Herz.", c: "ba", cap: "Sarajevo", r: "Europa"},
    {n: "Bulgarien", c: "bg", cap: "Sofia", r: "Europa"}, {n: "Dänemark", c: "dk", cap: "Kopenhagen", r: "Europa"},
    {n: "Deutschland", c: "de", cap: "Berlin", r: "Europa"}, {n: "Estland", c: "ee", cap: "Tallinn", r: "Europa"},
    {n: "Finnland", c: "fi", cap: "Helsinki", r: "Europa"}, {n: "Frankreich", c: "fr", cap: "Paris", r: "Europa"},
    {n: "Griechenland", c: "gr", cap: "Athen", r: "Europa"}, {n: "Irland", c: "ie", cap: "Dublin", r: "Europa"},
    {n: "Island", c: "is", cap: "Reykjavík", r: "Europa"}, {n: "Italien", c: "it", cap: "Rom", r: "Europa"},
    {n: "Kroatien", c: "hr", cap: "Zagreb", r: "Europa"}, {n: "Lettland", c: "lv", cap: "Riga", r: "Europa"},
    {n: "Liechtenstein", c: "li", cap: "Vaduz", r: "Europa"}, {n: "Litauen", c: "lt", cap: "Vilnius", r: "Europa"},
    {n: "Luxemburg", c: "lu", cap: "Luxemburg", r: "Europa"}, {n: "Malta", c: "mt", cap: "Valletta", r: "Europa"},
    {n: "Moldawien", c: "md", cap: "Chișinău", r: "Europa"}, {n: "Monaco", c: "mc", cap: "Monaco", r: "Europa"},
    {n: "Montenegro", c: "me", cap: "Podgorica", r: "Europa"}, {n: "Niederlande", c: "nl", cap: "Amsterdam", r: "Europa"},
    {n: "Norwegen", c: "no", cap: "Oslo", r: "Europa"}, {n: "Österreich", c: "at", cap: "Wien", r: "Europa"},
    {n: "Polen", c: "pl", cap: "Warschau", r: "Europa"}, {n: "Portugal", c: "pt", cap: "Lissabon", r: "Europa"},
    {n: "Rumänien", c: "ro", cap: "Bukarest", r: "Europa"}, {n: "Russland", c: "ru", cap: "Moskau", r: "Europa"},
    {n: "Schweden", c: "se", cap: "Stockholm", r: "Europa"}, {n: "Schweiz", c: "ch", cap: "Bern", r: "Europa"},
    {n: "Serbien", c: "rs", cap: "Belgrad", r: "Europa"}, {n: "Slowakei", c: "sk", cap: "Bratislava", r: "Europa"},
    {n: "Slowenien", c: "si", cap: "Ljubljana", r: "Europa"}, {n: "Spanien", c: "es", cap: "Madrid", r: "Europa"},
    {n: "Tschechien", c: "cz", cap: "Prag", r: "Europa"}, {n: "Ukraine", c: "ua", cap: "Kiew", r: "Europa"},
    {n: "Ungarn", c: "hu", cap: "Budapest", r: "Europa"}, {n: "Großbritannien", c: "gb", cap: "London", r: "Europa"},
    
    // AFRIKA
    {n: "Ägypten", c: "eg", cap: "Kairo", r: "Afrika"}, {n: "Algerien", c: "dz", cap: "Algier", r: "Afrika"},
    {n: "Angola", c: "ao", cap: "Luanda", r: "Afrika"}, {n: "Äthiopien", c: "et", cap: "Addis Abeba", r: "Afrika"},
    {n: "Botswana", c: "bw", cap: "Gaborone", r: "Afrika"}, {n: "Elfenbeinküste", c: "ci", cap: "Yamoussoukro", r: "Afrika"},
    {n: "Ghana", c: "gh", cap: "Accra", r: "Afrika"}, {n: "Kamerun", c: "cm", cap: "Yaoundé", r: "Afrika"},
    {n: "Kenia", c: "ke", cap: "Nairobi", r: "Afrika"}, {n: "Kongo (Dem. Rep.)", c: "cd", cap: "Kinshasa", r: "Afrika"},
    {n: "Libyen", c: "ly", cap: "Tripolis", r: "Afrika"}, {n: "Madagaskar", c: "mg", cap: "Antananarivo", r: "Afrika"},
    {n: "Marokko", c: "ma", cap: "Rabat", r: "Afrika"}, {n: "Namibia", c: "na", cap: "Windhuk", r: "Afrika"},
    {n: "Nigeria", c: "ng", cap: "Abuja", r: "Afrika"}, {n: "Senegal", c: "sn", cap: "Dakar", r: "Afrika"},
    {n: "Simbabwe", c: "zw", cap: "Harare", r: "Afrika"}, {n: "Südafrika", c: "za", cap: "Pretoria", r: "Afrika"},
    {n: "Sudan", c: "sd", cap: "Khartum", r: "Afrika"}, {n: "Tansania", c: "tz", cap: "Dodoma", r: "Afrika"},
    {n: "Tunesien", c: "tn", cap: "Tunis", r: "Afrika"}, {n: "Uganda", c: "ug", cap: "Kampala", r: "Afrika"},

    // ASIEN
    {n: "Afghanistan", c: "af", cap: "Kabul", r: "Asien"}, {n: "Armenien", c: "am", cap: "Jerewan", r: "Asien"},
    {n: "Aserbaidschan", c: "az", cap: "Baku", r: "Asien"}, {n: "China", c: "cn", cap: "Peking", r: "Asien"},
    {n: "Indien", c: "in", cap: "Neu-Delhi", r: "Asien"}, {n: "Indonesien", c: "id", cap: "Jakarta", r: "Asien"},
    {n: "Irak", c: "iq", cap: "Bagdad", r: "Asien"}, {n: "Iran", c: "ir", cap: "Teheran", r: "Asien"},
    {n: "Israel", c: "il", cap: "Jerusalem", r: "Asien"}, {n: "Japan", c: "jp", cap: "Tokio", r: "Asien"},
    {n: "Jordanien", c: "jo", cap: "Amman", r: "Asien"}, {n: "Kasachstan", c: "kz", cap: "Astana", r: "Asien"},
    {n: "Katar", c: "qa", cap: "Doha", r: "Asien"}, {n: "Malaysia", c: "my", cap: "Kuala Lumpur", r: "Asien"},
    {n: "Mongolei", c: "mn", cap: "Ulaanbaatar", r: "Asien"}, {n: "Nordkorea", c: "kp", cap: "Pjöngjang", r: "Asien"},
    {n: "Pakistan", c: "pk", cap: "Islamabad", r: "Asien"}, {n: "Philippinen", c: "ph", cap: "Manila", r: "Asien"},
    {n: "Saudi-Arabien", c: "sa", cap: "Riad", r: "Asien"}, {n: "Südkorea", c: "kr", cap: "Seoul", r: "Asien"},
    {n: "Thailand", c: "th", cap: "Bangkok", r: "Asien"}, {n: "Türkei", c: "tr", cap: "Ankara", r: "Asien"},
    {n: "Vietnam", c: "vn", cap: "Hanoi", r: "Asien"}, {n: "V.A. Emirate", c: "ae", cap: "Abu Dhabi", r: "Asien"},

    // NORDAMERIKA
    {n: "Bahamas", c: "bs", cap: "Nassau", r: "Nordamerika"}, {n: "Costa Rica", c: "cr", cap: "San José", r: "Nordamerika"},
    {n: "Dom. Republik", c: "do", cap: "Santo Domingo", r: "Nordamerika"}, {n: "Guatemala", c: "gt", cap: "Guatemala-Stadt", r: "Nordamerika"},
    {n: "Haiti", c: "ht", cap: "Port-au-Prince", r: "Nordamerika"}, {n: "Honduras", c: "hn", cap: "Tegucigalpa", r: "Nordamerika"},
    {n: "Jamaika", c: "jm", cap: "Kingston", r: "Nordamerika"}, {n: "Kanada", c: "ca", cap: "Ottawa", r: "Nordamerika"},
    {n: "Kuba", c: "cu", cap: "Havanna", r: "Nordamerika"}, {n: "Mexiko", c: "mx", cap: "Mexiko-Stadt", r: "Nordamerika"},
    {n: "Panama", c: "pa", cap: "Panama-Stadt", r: "Nordamerika"}, {n: "USA", c: "us", cap: "Washington D.C.", r: "Nordamerika"},

    // SÜDAMERIKA
    {n: "Argentinien", c: "ar", cap: "Buenos Aires", r: "Südamerika"}, {n: "Bolivien", c: "bo", cap: "Sucre", r: "Südamerika"},
    {n: "Brasilien", c: "br", cap: "Brasília", r: "Südamerika"}, {n: "Chile", c: "cl", cap: "Santiago de Chile", r: "Südamerika"},
    {n: "Ecuador", c: "ec", cap: "Quito", r: "Südamerika"}, {n: "Kolumbien", c: "co", cap: "Bogotá", r: "Südamerika"},
    {n: "Paraguay", c: "py", cap: "Asunción", r: "Südamerika"}, {n: "Peru", c: "pe", cap: "Lima", r: "Südamerika"},
    {n: "Uruguay", c: "uy", cap: "Montevideo", r: "Südamerika"}, {n: "Venezuela", c: "ve", cap: "Caracas", r: "Südamerika"},

    // OZEANIEN
    {n: "Australien", c: "au", cap: "Canberra", r: "Ozeanien"}, {n: "Fidschi", c: "fj", cap: "Suva", r: "Ozeanien"},
    {n: "Neuseeland", c: "nz", cap: "Wellington", r: "Ozeanien"}, {n: "Papua-Neuguinea", c: "pg", cap: "Port Moresby", r: "Ozeanien"}
];

    let s = { mode: '', reg: '', score: 0, coins: parseInt(localStorage.getItem('coins')) || 0, xp: parseInt(localStorage.getItem('xp')) || 0, daily: localStorage.getItem('daily') === new Date().toDateString() };

    function up() {
        document.getElementById('coins').innerText = s.coins;
        let l = Math.floor(s.xp / 100) + 1;
        document.getElementById('lvl').innerText = l;
        document.getElementById('fill').style.width = (s.xp % 100) + "%";
        document.getElementById('daily').disabled = s.daily;
    }

    function sel(m) { s.mode = m; document.getElementById('r-over').classList.remove('hidden'); buildR(); }
    function buildR() {
        const g = document.getElementById('r-grid'); g.innerHTML = '';
        ["Alle", "Europa", "Afrika", "Asien", "Nordamerika", "Südamerika", "Ozeanien"].forEach(r => {
            let b = document.createElement('button'); b.innerText = r; b.onclick = () => start(r); g.appendChild(b);
        });
    }

    function start(r) {
        s.reg = r; s.score = 0; document.getElementById('r-over').classList.add('hidden');
        if(s.mode === 'learn') { document.getElementById('l-over').classList.remove('hidden'); nextCard(); buildT(); }
        else { document.getElementById('m-over').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); nextQ(); }
    }

    function nextCard() {
        let list = s.reg === 'Alle' ? countries : countries.filter(c => c.r === s.reg);
        let c = list[Math.floor(Math.random() * list.length)];
        document.querySelector('.flashcard').classList.remove('flip');
        document.getElementById('c-img').src = "flags/" + c.c + ".png";
        document.getElementById('c-n').innerText = c.n;
        document.getElementById('c-c').innerText = "Hauptstadt: " + c.cap;
    }

    function buildT() {
        let list = s.reg === 'Alle' ? countries : countries.filter(c => c.r === s.reg);
        let h = "<tr><th>Flagge</th><th>Land</th></tr>";
        list.forEach(c => h += `<tr><td><img src="flags/${c.c}.png" width="30"></td><td>${c.n} (${c.cap})</td></tr>`);
        document.getElementById('l-table').innerHTML = h;
    }

    function nextQ() {
        let list = s.reg === 'Alle' ? countries : countries.filter(c => c.r === s.reg);
        s.curr = list[Math.floor(Math.random() * list.length)];
        if(s.mode === 'flags') { document.getElementById('q-img').src = "flags/"+s.curr.c+".png"; document.getElementById('q-cap').classList.add('hidden'); }
        else { document.getElementById('q-img').src = ""; document.getElementById('q-cap').classList.remove('hidden'); document.getElementById('q-cap').innerText = s.curr.n; }
        let corr = s.mode === 'flags' ? s.curr.n : s.curr.cap;
        let opts = [corr];
        while(opts.length < 4) { let r = countries[Math.floor(Math.random() * countries.length)].n; if(!opts.includes(r)) opts.push(r); }
        opts.sort(() => Math.random() - 0.5);
        document.querySelectorAll('.a-btn').forEach((b, i) => { b.innerText = opts[i]; b.style.visibility = 'visible'; });
    }

    function check(b) {
        let corr = s.mode === 'flags' ? s.curr.n : s.curr.cap;
        if(b.innerText === corr) { s.score++; s.coins += 10; s.xp += 15; }
        else { alert("Falsch! Richtig war: " + corr); }
        localStorage.setItem('coins', s.coins); localStorage.setItem('xp', s.xp);
        document.getElementById('scr').innerText = "Punkte: " + s.score; up(); nextQ();
    }

    function joker() {
        if(s.coins >= 50) { s.coins -= 50; up();
            let corr = s.mode === 'flags' ? s.curr.n : s.curr.cap;
            let btns = Array.from(document.querySelectorAll('.a-btn')).filter(b => b.innerText !== corr);
            btns[0].style.visibility = 'hidden'; btns[1].style.visibility = 'hidden';
        }
    }
    function home() { location.reload(); }
    function shop() { if(confirm("500 Münzen kaufen?")) { s.coins += 500; up(); } }
    up();
</script>
</body>
</html>
